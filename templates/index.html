<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StegoEXIF Tool</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --panel-bg: #121824;
            --accent: #00ffaa;
            --text: #e2e8f0;
            --border: #223147;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.1);
        }
        h1 { text-align: center; color: var(--accent); margin-top: 0; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        .tab-btn {
            background: none; border: 1px solid var(--border); color: var(--text);
            padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .box { background: #070a10; border: 1px dashed var(--border); padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        input[type="file"], input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; background: #000; border: 1px solid var(--border); color: white;}
        button.action-btn { background: #1a2333; border: 1px solid var(--accent); color: var(--accent); padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        button.action-btn:hover { background: var(--accent); color: #000; }
        pre { background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 13px; max-height: 200px;}
    </style>
</head>
<body>

<div class="container">
    <h1>📡 StegoEXIF Tool v1.0</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('exif')">🔍 Analizador EXIF</button>
        <button class="tab-btn" onclick="switchTab('stego')">🔐 Ocultar / Revelar Escritos</button>
    </div>

    <!-- PESTAÑA 1: EXIF -->
    <div id="exif" class="tab-content active">
        <div class="box">
            <h3>Analizar metadatos de una foto</h3>
            <input type="file" id="exif-file" accept="image/jpeg, image/jpg">
            <button class="action-btn" onclick="analyzeExif()">Escanear Metadatos</button>
        </div>
        <h4>Resultado del Análisis:</h4>
        <pre id="exif-output">Sube una imagen para ver sus metadatos ocultos...</pre>
    </div>

    <!-- PESTAÑA 2: STEGO -->
    <div id="stego" class="tab-content">
        <div class="box">
            <h3>1. Ocultar Texto Cifrado en Imagen</h3>
            <input type="file" id="hide-file" accept="image/png, image/jpeg">
            <input type="text" id="hide-message" placeholder="Escribe el mensaje secreto aquí...">
            <button class="action-btn" onclick="hideMessage()">Inyectar Mensaje y Descargar</button>
        </div>
        
        <div class="box">
            <h3>2. Revelar Texto desde Imagen Modificada</h3>
            <input type="file" id="reveal-file" accept="image/png">
            <button class="action-btn" onclick="revealMessage()">Extraer Mensaje Oculto</button>
        </div>
        <h4>Mensaje Extraído:</h4>
        <pre id="stego-output">Los secretos extraídos aparecerán aquí...</pre>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    async function analyzeExif() {
        const fileInput = document.getElementById('exif-file').files[0];
        if (!fileInput) return alert("Selecciona una foto primero");
        
        const formData = new FormData();
        formData.append('image', fileInput);

        const response = await fetch('/api/exif', { method: 'POST', body: formData });
        const data = await response.json();
        
        document.getElementById('exif-output').innerText = data.exif && Object.keys(data.exif).length 
            ? JSON.stringify(data.exif, null, 2) 
            : `ℹ️ ${data.message}`;
    }

    async function hideMessage() {
        const fileInput = document.getElementById('hide-file').files[0];
        const message = document.getElementById('hide-message').value;
        if (!fileInput || !message) return alert("Selecciona imagen y escribe un mensaje");

        const formData = new FormData();
        formData.append('image', fileInput);
        formData.append('message', message);

        // Hacemos que se descargue el archivo directamente
        const response = await fetch('/api/hide', { method: 'POST', body: formData });
        const blob = await response.getReader();
        
        // Simular descarga del archivo procesado
        const responseBlob = await response.blob();
        const url = window.URL.createObjectURL(responseBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "secreto_esteganografico.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
    }

    async function revealMessage() {
        const fileInput = document.getElementById('reveal-file').files[0];
        if (!fileInput) return alert("Selecciona la imagen PNG modificada");

        const formData = new FormData();
        formData.append('image', fileInput);

        const response = await fetch('/api/reveal', { method: 'POST', body: formData });
        const data = await response.json();
        document.getElementById('stego-output').innerText = `🔓 Mensaje: ${data.message}`;
    }
</script>
</body>
</html>
